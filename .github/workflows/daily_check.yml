name: Daily Win Check
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install requests
        run: pip install requests

      - name: Debug - List Files
        run: ls -R  # This helps us see where main.py actually is

      - name: Run win tracker
        run: python main.py
